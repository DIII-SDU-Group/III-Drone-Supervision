node_name: "tf_sim_launch_manager"
node_namespace: "managed_nodes"
log_level: "debug"

command: "ros2 launch iii_drone_simulation tf_sim.launch.py"
working_directory: "$HOME"

process_monitor_command: "topics=$(timeout 3s ros2 topic list) ; echo \"$topics\" | grep -q \"/tf\" && echo \"$topics\" | grep -q \"/tf_static\" && tf=$(timeout 5s ros2 topic echo --once /tf) && echo \"$tf\" | grep -q \"transforms:\" && exit 0 || exit 1"
process_monitor_period_sec: 10
process_start_timeout_sec: 30